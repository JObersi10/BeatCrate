name: Build

on:
  - push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

          # QPM v1.5.8 (same version used by working BS mods)
          TMP_DIR="/tmp/qpm"
          mkdir -p "$TMP_DIR"
          curl -L "https://github.com/QuestPackageManager/QPM.CLI/releases/download/v1.5.8/qpm-linux-x64.zip" \
            -o "$TMP_DIR/qpm.zip"
          unzip -o "$TMP_DIR/qpm.zip" -d "$TMP_DIR"
          QPM_BIN=$(find "$TMP_DIR" -type f -name qpm)
          chmod +x "$QPM_BIN"
          sudo ln -sf "$QPM_BIN" /usr/local/bin/qpm

          # NDK via QPM (NDK 27 — matches what working mods use)
          qpm ndk download 27
          NDK_PATH=$(qpm ndk list | grep -F "27." | awk '{print $3}')
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV

      - name: QPM restore
        run: qpm restore

      - name: Read version
        id: meta
        run: echo "version=$(jq -r '.version' qpm.json)" >> $GITHUB_OUTPUT

      - name: Configure CMake
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release \
            -DDEFINED_BS_QUEST=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Package .qmod
        run: |
          VERSION=${{ steps.meta.outputs.version }}
          QMOD="BeatCrate-v${VERSION}.qmod"

          cp mod.template.json mod.json

          mkdir -p package
          cp build/libapple-music-search.so package/
          cp mod.json package/
          [ -f assets/cover.png ] && cp assets/cover.png package/

          cd package && zip -r "../${QMOD}" . && cd ..
          echo "QMOD=${QMOD}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeatCrate-v${{ steps.meta.outputs.version }}
          path: ${{ env.QMOD }}
          compression-level: 0

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.QMOD }}
          generate_release_notes: true
          name: BeatCrate ${{ steps.meta.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
